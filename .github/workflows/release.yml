name: Release Linux
on:
  push:
    tags:
      - 'v*' # Сработает только когда ты создаешь тег версии, например v1.0.0

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04 # Используем свежую Ubuntu для сборки Tauri v2
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies (Tauri v2)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build and Release (Tauri v2 Action)
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Release ${{ github.ref_name }}'
          releaseBody: 'Автоматический релиз приложения Border Sentinel для Linux.'
